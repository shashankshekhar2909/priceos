services:
  web:
    build: .
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MASTER_SECRET=${MASTER_SECRET:-priceos-dev-secret-change-me}
    volumes:
      - priceos_data:/app/data
    restart: unless-stopped

volumes:
  priceos_data:
